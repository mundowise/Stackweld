name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f572a2b2b8a0a4783 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install system dependencies
        run: sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Publish to npm
        run: |
          pnpm --filter @stackweld/core publish --access public --no-git-checks
          pnpm --filter @stackweld/registry publish --access public --no-git-checks
          pnpm --filter @stackweld/templates publish --access public --no-git-checks
          pnpm --filter @stackweld/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-desktop:
    needs: publish-npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: macos-latest
            target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f572a2b2b8a0a4783 # v4.4.0
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91a07 # stable

      - name: Rust cache
        uses: swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: packages/desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@263291976d6e2faca404a945090ff24eab48b04e # v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Stackweld ${{ github.ref_name }}'
          releaseBody: |
            ## Stackweld ${{ github.ref_name }}

            Download the installer for your platform below.

            ### Install via CLI (alternative)
            ```bash
            npx @stackweld/cli doctor
            ```

            See [CHANGELOG](https://github.com/mundowise/Stackweld/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
