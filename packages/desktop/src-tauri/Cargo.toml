[package]
name = "stackpilot-desktop"
version = "0.1.0"
description = "StackPilot Desktop App"
authors = ["Orlando Fernandez"]
edition = "2021"

[lib]
name = "stackpilot_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.35"
